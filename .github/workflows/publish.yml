name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub Releases
  id-token: write   # npm provenance attestations

jobs:
  publish:
    name: Publish to npm
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag version ($TAG) does not match package.json version ($PKG). Bump package.json and re-tag."
            exit 1
          fi

      - name: Verify plugin manifest version matches package.json
        run: |
          PKG=$(node -p "require('./package.json').version")
          PLUGIN=$(node -p "require('./.claude-plugin/plugin.json').version")
          if [ "$PKG" != "$PLUGIN" ]; then
            echo "::error::package.json ($PKG) and .claude-plugin/plugin.json ($PLUGIN) versions diverge."
            exit 1
          fi

      - run: npm ci
      - run: npm run test:run

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

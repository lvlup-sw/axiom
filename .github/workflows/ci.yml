name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Structural Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Verify package-lock is in sync with package.json
        run: |
          PKG=$(node -p "require('./package.json').version")
          LOCK=$(node -p "require('./package-lock.json').version")
          if [ "$PKG" != "$LOCK" ]; then
            echo "::error::package.json version ($PKG) does not match package-lock.json version ($LOCK). Run 'npm install' locally and commit the lockfile."
            exit 1
          fi

      - run: npm ci
      - run: npm run test:run
